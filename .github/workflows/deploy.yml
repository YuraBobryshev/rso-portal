name: Continuous Deployment (Callisto VPS)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploying code via SSH to Callisto VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 176.98.177.3
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "--- Переходим в директорию проекта ---"
            cd ~/rso-portal
            
            echo "--- Стягиваем свежий код из Git ---"
            git pull origin main
            
            echo "--- Перезапускаем и собираем Docker контейнеры ---"
            docker compose up -d --build
            
            echo "--- Ожидаем запуск базы данных (5 секунд) ---"
            sleep 5
            
            echo "--- Автоматически применяем новую структуру БД (Prisma Push) ---"
            docker compose exec -T app npx prisma db push --accept-data-loss
            
            echo "--- Очищаем неиспользуемые старые образы Docker ---"
            docker image prune -f
            
            echo "🚀 Автодеплой и синхронизация БД успешно завершены!"