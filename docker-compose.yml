services:
  # 1. База данных Postgres
  db:
    image: postgres:15-alpine
    container_name: rso_db
    restart: always
    environment:
      POSTGRES_USER: rso_user
      POSTGRES_PASSWORD: rso_password
      POSTGRES_DB: rso_portal
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Бэкенд (Node.js API)
  app:
    build: ./server
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      - db

  # 3. Фронтенд (React)
  client:
    build: ./client
    restart: always
    expose:
      - "80"

  # 4. Обратный прокси (Caddy с авто-HTTPS)
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - client

volumes:
  caddy_data:
  caddy_config:
  pg_data: